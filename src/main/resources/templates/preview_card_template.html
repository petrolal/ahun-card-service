<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            padding: 20px;
            font-family: 'Arial', sans-serif;
        }

        /* Moldura estilo Canvas / Preview */
        .canvas-container {
            width: 1080px;
            height: 1350px;
            position: relative;
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            overflow: hidden;
        }
    </style>
    <style th:replace="~{fragments/card_components :: cardStyles}"></style>
</head>
<body>

<div class="canvas-container"
     th:style="${bgImageDataUri != null and !bgImageDataUri.isEmpty()} ? 'background-image: url(' + ${bgImageDataUri} + ');' : 'background-image: url(/images/' + (${bgImageName != null ? bgImageName : 'gira_de_exu_e_cura_2.png'}) + ');'">

    <!-- Reusable Card Fields Fragment -->
    <div th:replace="~{fragments/card_components :: cardFields}"></div>

</div>

</body>
</html>
